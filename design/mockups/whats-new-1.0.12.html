<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BorgDock — What's new 1.0.12 hero mockup</title>
    <style>
      :root {
        --c-bg: #110f1a;
        --c-border-subtle: rgba(138, 133, 160, 0.14);
        --c-text-primary: #edeaf4;
        --c-text-muted: #8a85a0;
        --c-accent: #7c6af6;
        --c-accent-bright: #9384f7;
        --c-green: #7dd3c0;
        --c-red: #e54065;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0b0810;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 40px 24px;
        color: var(--c-text-primary);
      }

      .hero {
        width: 450px;
        height: 74px;
        border-radius: 7px;
        border: 1px solid var(--c-border-subtle);
        overflow: hidden;
        position: relative;
        isolation: isolate;
      }

      /* Grain */
      .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='1'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/></svg>");
        mix-blend-mode: overlay;
      }

      /* ============================================================
       * HERO — Auto-update fix
       * Split composition: "before" updater (broken, stuck on old
       * version) on the left, "after" (correctly detects v1.0.13)
       * on the right, with a success arrow between them.
       * ============================================================ */
      .hero--auto-update {
        background: radial-gradient(
            ellipse 400px 180px at 80% 50%,
            rgba(125, 211, 192, 0.24),
            transparent 65%
          ),
          radial-gradient(
            ellipse 280px 140px at 15% 30%,
            rgba(229, 64, 101, 0.14),
            transparent 60%
          ),
          linear-gradient(160deg, #17103a 0%, #0d0a1f 100%);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        gap: 10px;
      }
      /* Stale card (before) — red dot, stuck on old version */
      .hero--auto-update .card {
        background: rgba(26, 23, 38, 0.8);
        border: 1px solid rgba(237, 234, 244, 0.1);
        border-radius: 6px;
        padding: 7px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        backdrop-filter: blur(10px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      }
      .hero--auto-update .card.stale {
        opacity: 0.82;
      }
      .hero--auto-update .card .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .hero--auto-update .card.stale .dot {
        background: var(--c-red);
        box-shadow: 0 0 6px rgba(229, 64, 101, 0.55);
      }
      .hero--auto-update .card.fresh .dot {
        background: var(--c-green);
        box-shadow: 0 0 7px var(--c-green);
      }
      .hero--auto-update .card .lines {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }
      .hero--auto-update .card .primary {
        font-size: 10px;
        font-weight: 600;
        color: #fff;
        letter-spacing: -0.005em;
      }
      .hero--auto-update .card.stale .primary {
        color: rgba(237, 234, 244, 0.62);
        text-decoration: line-through;
        text-decoration-color: rgba(229, 64, 101, 0.55);
        text-decoration-thickness: 1px;
      }
      .hero--auto-update .card .secondary {
        font-size: 8px;
        color: var(--c-text-muted);
      }
      .hero--auto-update .card.stale .secondary {
        color: rgba(229, 64, 101, 0.7);
      }
      .hero--auto-update .card.fresh .secondary {
        color: var(--c-green);
      }
      /* Middle arrow */
      .hero--auto-update .arrow {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: var(--c-accent-bright);
        flex-shrink: 0;
        font-weight: 700;
      }
      .hero--auto-update .arrow::before,
      .hero--auto-update .arrow::after {
        content: '';
        width: 12px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(124, 106, 246, 0.55)
        );
      }
      .hero--auto-update .arrow::after {
        background: linear-gradient(
          90deg,
          rgba(124, 106, 246, 0.55),
          transparent
        );
      }
      /* Install button on the fresh card */
      .hero--auto-update .install-btn {
        padding: 4px 10px;
        font-size: 9.5px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(180deg, #a98bff 0%, #7c6af6 100%);
        border: 0;
        border-radius: 4px;
        white-space: nowrap;
        box-shadow: 0 0 0 1px rgba(124, 106, 246, 0.4),
          0 4px 10px -2px rgba(124, 106, 246, 0.5);
      }
    </style>
  </head>
  <body>
    <div data-hero="auto-update-fix" class="hero hero--auto-update">
      <div class="card stale">
        <span class="dot"></span>
        <div class="lines">
          <div class="primary">v1.0.10</div>
          <div class="secondary">wrong "latest"</div>
        </div>
      </div>
      <span class="arrow">→</span>
      <div class="card fresh">
        <span class="dot"></span>
        <div class="lines">
          <div class="primary">v1.0.13 available</div>
          <div class="secondary">correctly detected</div>
        </div>
        <button class="install-btn">Install</button>
      </div>
    </div>
  </body>
</html>
