<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/prdock-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRDock</title>
    <script>
      (function(){try{var s=localStorage.getItem('prdock-theme');var d=s==='dark'||(s!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches);if(d)document.documentElement.classList.add('dark');}catch(e){}})();
    </script>
  </head>
  <body class="bg-transparent overflow-hidden select-none">
    <div id="root">
      <div id="splash">
        <!-- Logo mark -->
        <div class="sp-tile">
          <svg width="28" height="28" viewBox="0 0 16 16" fill="none" class="sp-logo">
            <path d="M2 9 L4 9 L5.5 5 L7.5 12 L9 3 L11 11 L12.5 7 L14 9"
              stroke="white" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" class="sp-wave"/>
            <circle cx="14" cy="9" r="1.3" fill="white" opacity="0.85" class="sp-dot"/>
          </svg>
        </div>
        <!-- App name -->
        <div class="sp-name">PRDock</div>
        <!-- Thin progress bar -->
        <div class="sp-track"><div class="sp-bar"></div></div>
      </div>
      <style>
        html,body,#root{margin:0;padding:0;height:100%;overflow:hidden}
        #splash{
          display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
          position:fixed;inset:0;
          background:linear-gradient(180deg,#F7F5FB 0%,#EDEAF4 100%);
        }
        .sp-tile{
          width:56px;height:56px;border-radius:14px;
          display:flex;align-items:center;justify-content:center;
          background:linear-gradient(135deg,#6655D4 0%,#7C6AF6 100%);
          opacity:0;animation:sp-in .5s ease forwards,sp-breathe 2.4s ease-in-out .5s infinite;
        }
        .sp-wave{
          stroke-dasharray:60;stroke-dashoffset:60;
          animation:sp-draw .9s ease .25s forwards;
        }
        .sp-dot{animation:sp-dot-in .5s ease .9s forwards;opacity:0}
        .sp-name{
          font:600 13px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
          letter-spacing:.04em;color:#5A5670;
          opacity:0;animation:sp-in .4s ease .35s forwards;
        }
        .sp-track{
          width:48px;height:2px;border-radius:1px;
          background:rgba(102,85,212,.12);overflow:hidden;
          opacity:0;animation:sp-in .3s ease .7s forwards;
        }
        .sp-bar{
          width:40%;height:100%;border-radius:1px;
          background:linear-gradient(90deg,#6655D4,#7C6AF6);
          animation:sp-slide 1.1s ease-in-out .8s infinite;
        }
        @keyframes sp-in{to{opacity:1}}
        @keyframes sp-draw{to{stroke-dashoffset:0}}
        @keyframes sp-dot-in{to{opacity:0.85}}
        @keyframes sp-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        @keyframes sp-slide{
          0%{transform:translateX(-100%)}
          50%{transform:translateX(200%)}
          100%{transform:translateX(-100%)}
        }
        /* Dark theme */
        html.dark #splash{background:linear-gradient(180deg,#110F1A 0%,#1A1726 100%)}
        html.dark .sp-name{color:#8A85A0}
        html.dark .sp-track{background:rgba(124,106,246,.12)}
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
