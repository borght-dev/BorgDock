name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in project
        shell: bash
        run: |
          sed -i'' -e "s/<Version>.*<\/Version>/<Version>${{ steps.version.outputs.VERSION }}<\/Version>/" src/PRDock.App/PRDock.App.csproj

      - name: Publish
        run: >
          dotnet publish src/PRDock.App
          -c Release
          -r win-x64
          --self-contained
          -p:EnableWindowsTargeting=true
          -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta generation)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack (skip installer — generated manually on Windows)
        run: >
          vpk pack
          --packId PRDock
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish
          --mainExe PRDock.App.exe
          --icon src/PRDock.App/Assets/tray-icon.ico
          --skipVeloAppCheck
          --noInst

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --tag ${{ github.ref_name }}
