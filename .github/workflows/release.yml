name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set version in project
        shell: pwsh
        run: |
          $file = "src/PRDock.App/PRDock.App.csproj"
          (Get-Content $file) -replace '<Version>.*</Version>', "<Version>${{ steps.version.outputs.VERSION }}</Version>" | Set-Content $file

      - name: Publish
        run: >
          dotnet publish src/PRDock.App
          -c Release
          -r win-x64
          --self-contained
          -o publish

      - name: Install Velopack CLI
        run: dotnet tool update -g vpk

      - name: Download previous release (for delta generation)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId PRDock
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish
          --mainExe PRDock.App.exe

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --tag ${{ github.ref_name }}
          --publish

      - name: Extract changelog for this version and update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $changelog = Get-Content CHANGELOG.md -Raw
          # Extract the section for this version (from ## <version> to the next ## or end of file)
          if ($changelog -match "(?ms)^## $([regex]::Escape($version)).*?\n(.*?)(?=^## |\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "Release $version"
          }
          gh release edit ${{ github.ref_name }} --notes "$notes"
