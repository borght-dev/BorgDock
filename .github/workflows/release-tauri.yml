name: Release Tauri

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mitigate Windows Defender file locks
        run: |
          # Try to add exclusions (requires admin — silently skip if not available)
          try { Add-MpPreference -ExclusionPath "${{ github.workspace }}" } catch {}
          try { Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo" } catch {}
          # Try to disable real-time monitoring for the build duration
          try { Set-MpPreference -DisableRealtimeMonitoring $true } catch {}

      - name: Kill stale processes
        run: |
          # Kill any lingering prdock.exe from previous builds
          Get-Process -Name prdock -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          # Kill any lingering NSIS processes
          Get-Process -Name makensis -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/PRDock.Tauri

      - name: Add NSIS to PATH
        run: echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Clean stale build artifacts
        run: |
          $releaseDir = Join-Path "src" "PRDock.Tauri" "src-tauri" "target" "release"
          # Clean bundle output
          $bundleDir = Join-Path $releaseDir "bundle"
          if (Test-Path $bundleDir) { Remove-Item $bundleDir -Recurse -Force -ErrorAction SilentlyContinue }
          # Clean the exe that NSIS bundles (prevents Defender from holding a stale memory-map)
          $exe = Join-Path $releaseDir "prdock.exe"
          if (Test-Path $exe) { Remove-Item $exe -Force -ErrorAction SilentlyContinue }

      - name: Build Tauri app
        run: |
          $maxAttempts = 2
          for ($i = 1; $i -le $maxAttempts; $i++) {
            Write-Host "Build attempt $i of $maxAttempts..."
            npx tauri build --bundles nsis 2>&1 | Tee-Object -Variable buildOutput
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Build succeeded on attempt $i"
              break
            }
            if ($i -lt $maxAttempts) {
              Write-Host "Build failed — waiting 15s before retry..."
              Start-Sleep -Seconds 15
            } else {
              Write-Host "Build failed on all attempts"
              exit 1
            }
          }
        working-directory: src/PRDock.Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Re-enable Windows Defender
        if: always()
        run: |
          try { Set-MpPreference -DisableRealtimeMonitoring $false } catch {}

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $ws = "${{ github.workspace }}"
          $nsisDir = Join-Path $ws "src" "PRDock.Tauri" "src-tauri" "target" "release" "bundle" "nsis"

          Write-Host "Looking for assets in: $nsisDir"
          Get-ChildItem $nsisDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  Found: $($_.Name)" }

          # Collect all bundle files
          $assets = @()
          Get-ChildItem $nsisDir -File -ErrorAction SilentlyContinue | ForEach-Object { $assets += $_.FullName }

          if ($assets.Count -eq 0) {
            Write-Error "No assets found!"
            exit 1
          }

          Write-Host "Uploading $($assets.Count) assets..."

          # Create release (ignore error if exists)
          gh release create $tag --title "PRDock $tag" --notes "See the assets to download and install this version." --latest 2>$null

          # Upload all assets
          foreach ($asset in $assets) {
            Write-Host "  Uploading: $(Split-Path $asset -Leaf)"
            gh release upload $tag $asset --clobber
          }

      - name: Generate and upload updater latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"
          $ws = "${{ github.workspace }}"
          $nsisDir = Join-Path $ws "src" "PRDock.Tauri" "src-tauri" "target" "release" "bundle" "nsis"

          # Check for .nsis.zip.sig (only exists if TAURI_SIGNING_PRIVATE_KEY is set)
          $sigFile = Join-Path $nsisDir "PRDock_${version}_x64-setup.nsis.zip.sig"
          $zipFile = Join-Path $nsisDir "PRDock_${version}_x64-setup.nsis.zip"

          if (Test-Path $sigFile) {
            $signature = (Get-Content $sigFile -Raw).Trim()
            $url = "https://github.com/$repo/releases/download/$tag/PRDock_${version}_x64-setup.nsis.zip"
          } else {
            Write-Host "No .sig file found — generating latest.json without signature (updater won't work, but WPF migration will)"
            $signature = ""
            $url = "https://github.com/$repo/releases/download/$tag/PRDock_${version}_x64-setup.exe"
          }

          $latest = @{
            version = $version
            notes = "PRDock $version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 4

          $latest | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json

          gh release upload $tag latest.json --clobber
