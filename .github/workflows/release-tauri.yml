name: Release Tauri

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mitigate Windows Defender file locks
        run: |
          # Try to add exclusions (requires admin — silently skip if not available)
          try { Add-MpPreference -ExclusionPath "${{ github.workspace }}" } catch {}
          try { Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo" } catch {}
          # Try to disable real-time monitoring for the build duration
          try { Set-MpPreference -DisableRealtimeMonitoring $true } catch {}

      - name: Kill stale processes
        run: |
          # Kill any lingering borgdock.exe from previous builds
          Get-Process -Name borgdock -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          # Kill any lingering NSIS processes
          Get-Process -Name makensis -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/BorgDock.Tauri

      - name: Add NSIS to PATH
        run: echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Clean target directory
        run: |
          $targetDir = Join-Path "src" "BorgDock.Tauri" "src-tauri" "target"
          if (Test-Path $targetDir) {
            Write-Host "Removing $targetDir to ensure clean build..."
            Remove-Item $targetDir -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Build Tauri app
        run: npx tauri build --bundles nsis
        working-directory: src/BorgDock.Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Re-enable Windows Defender
        if: always()
        run: |
          try { Set-MpPreference -DisableRealtimeMonitoring $false } catch {}

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $ws = "${{ github.workspace }}"
          $nsisDir = Join-Path $ws "src" "BorgDock.Tauri" "src-tauri" "target" "release" "bundle" "nsis"

          Write-Host "Looking for assets in: $nsisDir"
          Get-ChildItem $nsisDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  Found: $($_.Name)" }

          # Collect all bundle files
          $assets = @()
          Get-ChildItem $nsisDir -File -ErrorAction SilentlyContinue | ForEach-Object { $assets += $_.FullName }

          if ($assets.Count -eq 0) {
            Write-Error "No assets found!"
            exit 1
          }

          Write-Host "Uploading $($assets.Count) assets..."

          # Create release (ignore error if exists)
          gh release create $tag --title "BorgDock $tag" --notes "See the assets to download and install this version." --latest 2>$null

          # Upload all assets
          foreach ($asset in $assets) {
            Write-Host "  Uploading: $(Split-Path $asset -Leaf)"
            gh release upload $tag $asset --clobber
          }

      - name: Generate and upload updater latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"
          $ws = "${{ github.workspace }}"
          $nsisDir = Join-Path $ws "src" "BorgDock.Tauri" "src-tauri" "target" "release" "bundle" "nsis"

          # Check for .nsis.zip.sig (only exists if TAURI_SIGNING_PRIVATE_KEY is set)
          $sigFile = Join-Path $nsisDir "BorgDock_${version}_x64-setup.nsis.zip.sig"
          $zipFile = Join-Path $nsisDir "BorgDock_${version}_x64-setup.nsis.zip"

          if (Test-Path $sigFile) {
            $signature = (Get-Content $sigFile -Raw).Trim()
            $url = "https://github.com/$repo/releases/download/$tag/BorgDock_${version}_x64-setup.nsis.zip"
          } else {
            Write-Host "No .sig file found — generating latest.json without signature (updater won't work, but WPF migration will)"
            $signature = ""
            $url = "https://github.com/$repo/releases/download/$tag/BorgDock_${version}_x64-setup.exe"
          }

          $latest = @{
            version = $version
            notes = "BorgDock $version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 4

          $latest | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json

          gh release upload $tag latest.json --clobber
