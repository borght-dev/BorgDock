name: Release Tauri

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/PRDock.Tauri

      - name: Add NSIS to PATH
        run: echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Build Tauri app
        run: npx tauri build --bundles nsis,msi
        working-directory: src/PRDock.Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $ws = "${{ github.workspace }}"
          $nsisDir = Join-Path $ws "src" "PRDock.Tauri" "src-tauri" "target" "release" "bundle" "nsis"
          $msiDir = Join-Path $ws "src" "PRDock.Tauri" "src-tauri" "target" "release" "bundle" "msi"

          Write-Host "Looking for assets in:"
          Write-Host "  NSIS: $nsisDir"
          Write-Host "  MSI:  $msiDir"
          Get-ChildItem $nsisDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  Found: $($_.Name)" }
          Get-ChildItem $msiDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  Found: $($_.Name)" }

          # Collect all bundle files
          $assets = @()
          Get-ChildItem $nsisDir -File -ErrorAction SilentlyContinue | ForEach-Object { $assets += $_.FullName }
          Get-ChildItem $msiDir -File -ErrorAction SilentlyContinue | ForEach-Object { $assets += $_.FullName }

          if ($assets.Count -eq 0) {
            Write-Error "No assets found!"
            exit 1
          }

          Write-Host "Uploading $($assets.Count) assets..."

          # Create release (ignore error if exists)
          gh release create $tag --title "PRDock $tag" --notes "See the assets to download and install this version." --latest 2>$null

          # Upload all assets
          foreach ($asset in $assets) {
            Write-Host "  Uploading: $(Split-Path $asset -Leaf)"
            gh release upload $tag $asset --clobber
          }

      - name: Generate and upload updater latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"
          $ws = "${{ github.workspace }}"
          $nsisDir = Join-Path $ws "src" "PRDock.Tauri" "src-tauri" "target" "release" "bundle" "nsis"

          $sigFile = Join-Path $nsisDir "PRDock_${version}_x64-setup.nsis.zip.sig"
          if (-not (Test-Path $sigFile)) {
            Write-Error "Signature file not found: $sigFile"
            exit 1
          }

          $nsisZipSig = (Get-Content $sigFile -Raw).Trim()

          $latest = @{
            version = $version
            notes = "PRDock $version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisZipSig
                url = "https://github.com/$repo/releases/download/$tag/PRDock_${version}_x64-setup.nsis.zip"
              }
            }
          } | ConvertTo-Json -Depth 4

          $latest | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json

          gh release upload $tag latest.json --clobber
